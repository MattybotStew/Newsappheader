<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>accessWDUN</title>
    <script>
      // SPA redirect handler for GitHub Pages
      (function () {
        var redirect = sessionStorage.getItem('ghpages_redirect');
        if (redirect) {
          sessionStorage.removeItem('ghpages_redirect');
          window.history.replaceState(null, '', '/Newsappheader' + redirect);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
