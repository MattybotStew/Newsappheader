<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>accessWDUN</title>
    <script>
      // SPA redirect handler for GitHub Pages
      (function () {
        var redirect = sessionStorage.getItem('ghpages_redirect');
        if (redirect) {
          sessionStorage.removeItem('ghpages_redirect');
          window.history.replaceState(null, '', '/Newsappheader' + redirect);
        }
      })();
    </script>

    <!-- Google Publisher Tags (GPT) -->
    <script async src="https://securepubads.g.doubleclick.net/tag/js/gpt.js"></script>
    <script>
      window.googletag = window.googletag || { cmd: [] };
      googletag.cmd.push(function () {
        googletag.pubads().enableSingleRequest();
        googletag.pubads().collapseEmptyDivs();
        googletag.pubads().enableLazyLoad({
          fetchMarginPercent: 100,
          renderMarginPercent: 50,
          mobileScaling: 1.0,
        });
        googletag.enableServices();
      });
    </script>

    <!-- PubGuru Header Bidding -->
    <script async src="https://c.pubguru.net/pg.accesswdun.home.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
