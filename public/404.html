<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>accessWDUN</title>
    <script>
      // SPA redirect for GitHub Pages
      // Stores the full path in sessionStorage then redirects to the root
      var path = window.location.pathname;
      var search = window.location.search;
      var base = '/Newsappheader';
      var redirectPath = path.slice(base.length) || '/';
      sessionStorage.setItem('ghpages_redirect', redirectPath + search);
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
